<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Inventory System - Henry P Edition</title>
    <style>
        :root { 
            --bg-dark: #0f0f0f; 
            --card-bg: #181818; 
            --text-main: #e0e0e0; 
            --text-dim: #a0a0a0;
            --botanical-green: #4c7c4e; 
            --neon-green: #39FF14; 
            --border-color: #2a2a2a;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 15px; 
        }

        .credit { position: absolute; top: 15px; left: 20px; font-size: 0.7rem; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; }
        .container { max-width: 1100px; margin: 40px auto; display: flex; flex-direction: column; }

        .selected-info {
            font-size: 0.9rem; color: var(--text-dim); font-style: italic;
            margin-bottom: 8px; min-height: 1.2em;
        }

        .search-panel {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            border: 2px solid var(--neon-green); box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); 
            margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px;
        }

        .search-area { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; align-items: flex-end; }
        .main-search-box { position: relative; }
        
        .input-group label { 
            font-size: 0.75rem; color: var(--neon-green); 
            font-weight: 700; margin-bottom: 8px; display: block; text-transform: uppercase;
        }
        
        #plantInput, select {
            width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 10px;
            font-size: 1rem; background: #000; color: #fff; box-sizing: border-box;
        }

        #suggestions {
            position: absolute; top: calc(100% + 5px); left: 0; width: 100%; 
            background: #222; border: 1px solid var(--botanical-green);
            z-index: 2000; max-height: 250px; overflow-y: auto; display: none;
            border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }

        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #333; }
        .suggestion-item:hover { background: #2a2a2a; color: var(--neon-green); }

        /* Contenedor de resultados con scroll */
        .results-wrapper {
            border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color);
            background: #000; max-height: 60vh; overflow-y: auto;
        }

        .header { 
            background: var(--botanical-green); color: white; display: grid; 
            grid-template-columns: 1.2fr 2fr 1fr; padding: 12px; font-weight: 700; position: sticky; top: 0;
        }
        .row { display: grid; grid-template-columns: 1.2fr 2fr 1fr; padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }

        .btn-new { 
            background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); 
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; width: fit-content;
        }

        @media (max-width: 768px) {
            .search-area { grid-template-columns: 1fr; }
            .header, .row { grid-template-columns: 1fr 1.5fr 0.8fr; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="credit">PROJECT BY "Henry P"</div>

<div class="container">
    <div class="search-panel">
        <button class="btn-new" onclick="resetSearch()">New Search</button>
        <div id="selectionPreview" class="selected-info">Waiting for selection...</div>

        <div class="search-area">
            <!-- Buscador principal -->
            <div class="main-search-box">
                <div class="input-group">
                    <label>Botanic Name / SKU</label>
                    <input type="text" id="plantInput" placeholder="Loading..." disabled autocomplete="off">
                    <div id="suggestions"></div>
                </div>
            </div>

            <!-- Filtro Vendor -->
            <div class="input-group">
                <label>Vendor</label>
                <select id="vendorFilter" onchange="performSearch()">
                    <option value="any">Any Vendor</option>
                </select>
            </div>

            <!-- Filtro Size -->
            <div class="input-group">
                <label>Size</label>
                <select id="sizeFilter" onchange="performSearch()">
                    <option value="any">Any Size</option>
                    <option value="01">01G</option>
                    <option value="02">02G</option>
                    <option value="03">03G</option>
                    <option value="05">05G</option>
                    <option value="07">07G</option>
                    <option value="10">10G</option>
                    <option value="15">15G</option>
                    <option value="24">24"</option>
                    <option value="25">25G</option>
                    <option value="36">36"</option>
                </select>
            </div>
        </div>
    </div>

    <div class="results-wrapper">
        <div id="resultsHeader" class="header" style="display: none;">
            <div>VENDOR</div><div>BOTANIC NAME</div><div>SIZE</div>
        </div>
        <div id="resultsBody"></div>
    </div>
</div>

<script>
    let plantDB = [];
    let suggestionsDB = [];

    const plantInput = document.getElementById('plantInput');
    const vendorFilter = document.getElementById('vendorFilter');
    const sizeFilter = document.getElementById('sizeFilter');
    const sugBox = document.getElementById('suggestions');
    const resultsBody = document.getElementById('resultsBody');
    const resultsHeader = document.getElementById('resultsHeader');
    const preview = document.getElementById('selectionPreview');

    async function loadData() {
        try {
            const [resPlantas, resHome] = await Promise.all([
                fetch('plantas.json'), fetch('home.json')
            ]);
            plantDB = await resPlantas.json();
            suggestionsDB = await resHome.json();
            
            populateVendors();
            plantInput.disabled = false;
            plantInput.placeholder = "Type to search...";
        } catch (e) { plantInput.placeholder = "Error loading data."; }
    }

    function populateVendors() {
        const vendors = [...new Set(plantDB.map(item => item.company))].filter(Boolean).sort();
        vendors.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v; opt.textContent = v;
            vendorFilter.appendChild(opt);
        });
    }

    // Cerrar sugerencias al presionar Enter
    plantInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            sugBox.style.display = 'none';
            plantInput.blur(); // Cierra el teclado en móvil
        }
    });

    plantInput.addEventListener('input', () => {
        // RESET de filtros al escribir en el buscador
        vendorFilter.value = "any";
        sizeFilter.value = "any";

        let val = plantInput.value.toUpperCase().trim();
        if (val.length >= 2) {
            const queryWords = val.split(/\s+/);
            const matches = suggestionsDB.filter(s => {
                const name = (s.display_name || "").toUpperCase();
                return queryWords.every(word => name.includes(word));
            });

            if (matches.length > 0) {
                sugBox.innerHTML = matches.slice(0, 15).map(m => `
                    <div class="suggestion-item" onmousedown="applySug('${m.display_name.replace(/'/g, "&#39;")}')">
                        ${m.display_name}
                    </div>
                `).join('');
                sugBox.style.display = "block";
            } else { sugBox.style.display = "none"; }
        } else { sugBox.style.display = "none"; }
        performSearch();
    });

    function applySug(nombre) {
        const nombreLimpio = nombre.replace(/&#39;/g, "'");
        preview.innerText = nombreLimpio;
        plantInput.value = nombreLimpio; // O usa tu función de abreviación aquí
        sugBox.style.display = "none";
        performSearch();
    }

    function performSearch() {
        const query = plantInput.value.toUpperCase().trim();
        const vendorQuery = vendorFilter.value;
        const sizeQuery = sizeFilter.value;

        if (!query && vendorQuery === "any" && sizeQuery === "any") {
            resultsBody.innerHTML = ""; resultsHeader.style.display = "none"; return;
        }

        resultsHeader.style.display = "grid";
        const queryWords = query.split(/\s+/).filter(Boolean);

        const filtered = plantDB.filter(item => {
            const nameMatch = queryWords.every(w => item.name.toUpperCase().includes(w));
            const vendorMatch = vendorQuery === "any" || item.company === vendorQuery;
            const sizeMatch = sizeQuery === "any" || item.size.includes(sizeQuery);
            return nameMatch && vendorMatch && sizeMatch;
        });

        resultsBody.innerHTML = filtered.slice(0, 150).map(item => `
            <div class="row">
                <div>${item.company}</div>
                <div>${item.name}</div>
                <div>${item.size}</div>
            </div>
        `).join('');
    }

    function resetSearch() {
        plantInput.value = ""; vendorFilter.value = "any"; sizeFilter.value = "any";
        sugBox.style.display = "none"; preview.innerText = "Waiting for selection...";
        performSearch();
    }

    // Evitar que el cuadro se cierre al hacer clic en el scroll
    document.addEventListener('mousedown', (e) => {
        if (!sugBox.contains(e.target) && e.target !== plantInput) {
            sugBox.style.display = "none";
        }
    });

    loadData();
</script>

</body>
</html>
