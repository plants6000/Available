<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Inventory System - Henry P Edition</title>
    <style>
        :root { 
            --bg-dark: #0f0f0f; 
            --card-bg: #181818; 
            --text-main: #e0e0e0; 
            --text-dim: #a0a0a0;
            --botanical-green: #4c7c4e; 
            --neon-green: #39FF14; 
            --border-color: #2a2a2a;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 20px; 
        }

        .credit { position: absolute; top: 15px; left: 20px; font-size: 0.7rem; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; }
        .container { max-width: 1000px; margin: 50px auto; display: flex; flex-direction: column; }

        /* Panel de selección suave arriba del buscador */
        .selected-info {
            font-size: 0.9rem;
            color: var(--text-dim);
            font-style: italic;
            margin-bottom: 8px;
            min-height: 1.2em;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .search-panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--neon-green); 
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); 
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-area { display: flex; gap: 25px; align-items: flex-end; }
        .main-search-box { flex: 3; position: relative; }
        
        .input-group label { 
            font-size: 0.8rem; color: var(--neon-green); 
            font-weight: 700; margin-bottom: 8px; display: block;
        }
        
        #plantInput {
            width: 100%; padding: 15px; border: 2px solid var(--border-color); border-radius: 12px;
            font-size: 1.1rem; background: #000; color: #fff;
            transition: all 0.3s ease; box-sizing: border-box;
            text-transform: lowercase;
        }

        #suggestions {
            position: absolute; 
            top: calc(100% + 5px); 
            left: 0; width: 100%; 
            background: #222; border: 1px solid var(--botanical-green);
            z-index: 1001; max-height: 250px; overflow-y: auto; display: none;
            border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .suggestion-item { 
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #333; 
            display: flex; flex-direction: column; gap: 2px;
        }
        .suggestion-item:hover { background: #2a2a2a; border-left: 4px solid var(--neon-green); }
        
        .sug-botanic { font-weight: 700; font-size: 0.9rem; color: #fff; }

        .filters-column { flex: 1; }
        select { 
            background: #222; color: white; border: 2px solid var(--border-color); 
            padding: 14px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; width: 100%;
        }

        .results-container { border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--border-color); }
        .header { background: var(--botanical-green); color: white; display: grid; grid-template-columns: 1fr 2.5fr 1.5fr; padding: 14px; font-weight: 700; font-size: 0.85rem; }
        .row { display: grid; grid-template-columns: 1fr 2.5fr 1.5fr; padding: 14px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; align-items: center; }

        .btn-new { 
            background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); 
            padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600;
            width: fit-content; transition: 0.3s; margin-bottom: 10px;
        }
        .btn-new:hover { background: rgba(57, 255, 20, 0.1); }

        @media (max-width: 768px) {
            .search-area { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<div class="credit">PROJECT BY "Henry P"</div>

<div class="container">
    <div class="search-panel">
        <button class="btn-new" onclick="resetSearch()">New Search</button>
        
        <!-- Panel que muestra el nombre completo seleccionado -->
        <div id="selectionPreview" class="selected-info">Waiting for selection...</div>

        <div class="search-area">
            <div class="main-search-box">
                <div class="input-group">
                    <label>Search Botanic Name or SKU</label>
                    <input type="text" id="plantInput" placeholder="Loading data..." disabled autocomplete="off">
                    <div id="suggestions"></div>
                </div>
            </div>

            <div class="filters-column">
                <div class="input-group">
                    <label>Size</label>
                    <select id="sizeFilter" onchange="performSearch()">
                        <option value="any">Any Size</option>
                        <option value="01">01G</option>
                        <option value="02">02G</option>
                        <option value="03">03G</option>
                        <option value="05">05G</option>
                        <option value="07">07G</option>
                        <option value="10">10G</option>
                        <option value="15">15G</option>
                        <option value="24">24"</option>
                        <option value="25">25G</option>
                        <option value="36">36"</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="results-container">
        <div id="resultsHeader" class="header" style="display: none;">
            <div>VENDOR</div><div>BOTANIC NAME</div><div>SIZE / INFO</div>
        </div>
        <div id="resultsBody"></div>
    </div>
</div>

<script>
    let plantDB = [];
    let suggestionsDB = [];

    const plantInput = document.getElementById('plantInput');
    const preview = document.getElementById('selectionPreview');
    const sizeFilter = document.getElementById('sizeFilter');
    const sugBox = document.getElementById('suggestions');
    const resultsBody = document.getElementById('resultsBody');
    const resultsHeader = document.getElementById('resultsHeader');

    const formasAIgnorar = ["PREMIUM", "ASSORTED", "STD", "MULT", "PATIO", "ON", "POLE", "BOWL", "GARDEN", "CLAY", "SHRUB", "TREE", "STK", "COLUMN", "DWF", "SD", "MULTI", "TOP"];

    async function loadData() {
        try {
            const [resPlantas, resHome] = await Promise.all([
                fetch('plantas.json'),
                fetch('home.json')
            ]);
            plantDB = await resPlantas.json();
            suggestionsDB = await resHome.json();
            plantInput.disabled = false;
            plantInput.placeholder = "Enter Name or SKU...";
        } catch (error) {
            plantInput.placeholder = "Error loading data.";
        }
    }

    loadData();

    function procesarAbreviacion(textoCompleto) {
        let soloNombre = textoCompleto.split('(')[0].trim();
        const comillasMatch = soloNombre.match(/'(.*?)'/);
        let primeraPalabra = soloNombre.split(' ')[0].substring(0, 3);

        if (comillasMatch) {
            let dentro = comillasMatch[1].trim().split(/\s+/);
            if (dentro.length >= 2) {
                let inicial = dentro[0].substring(0, 1);
                let ultima = dentro[dentro.length - 1].substring(0, 4);
                return `${primeraPalabra} ${inicial} ${ultima}`.toLowerCase();
            } else {
                return `${primeraPalabra} ${dentro[0].substring(0, 4)}`.toLowerCase();
            }
        }

        let palabras = soloNombre.split(/\s+/).filter(p => {
            let limpia = p.toUpperCase().replace(/[^A-Z]/g, "");
            return limpia.length > 0 && !formasAIgnorar.includes(limpia);
        });

        if (palabras.length === 1) return palabras[0].substring(0, 5).toLowerCase();
        if (palabras.length > 1) {
            let ultima = palabras[palabras.length - 1].substring(0, 4);
            return `${primeraPalabra} ${ultima}`.toLowerCase();
        }
        return soloNombre.substring(0, 10).toLowerCase();
    }

    plantInput.addEventListener('input', () => {
        let val = plantInput.value.toUpperCase().trim();
        
        if (val.length >= 2) {
            const queryWords = val.split(/\s+/);
            let matches = suggestionsDB.filter(s => {
                const name = (s.display_name || "").toUpperCase();
                const sku = (s.variantes || "").toUpperCase();
                return queryWords.every(word => name.includes(word) || sku.includes(word));
            });

            if (matches.length > 0) {
                sugBox.innerHTML = matches.slice(0, 15).map(m => {
                    // Reemplazamos comillas simples por entidad HTML para que no rompa el onclick
                    const safeName = m.display_name.replace(/'/g, "&#39;");
                    return `
                        <div class="suggestion-item" onclick="applySug('${safeName}')">
                            <span class="sug-botanic">${m.display_name}</span>
                        </div>
                    `;
                }).join('');
                sugBox.style.display = "block";
            } else { sugBox.style.display = "none"; }
        } else { sugBox.style.display = "none"; }
        
        performSearch(); 
    });

    function applySug(nombreSeleccionado) {
        // Decodificar el nombre (convertir &#39; de nuevo a comilla)
        const decoder = document.createElement('textarea');
        decoder.innerHTML = nombreSeleccionado;
        const nombreLimpio = decoder.value;

        // 1. Mostrar nombre COMPLETO arriba del buscador
        preview.innerText = nombreLimpio;
        preview.style.color = "var(--neon-green)";

        // 2. Colocar la ABREVIACIÓN en el cuadro de búsqueda
        plantInput.value = procesarAbreviacion(nombreLimpio);
        
        sugBox.style.display = "none";
        performSearch();
        plantInput.focus();

        // Estética: volver el color a gris después de 1 segundo
        setTimeout(() => { preview.style.color = "var(--text-dim)"; }, 1000);
    }

    function performSearch() {
        const queryText = plantInput.value.toUpperCase().trim();
        const sizeQuery = sizeFilter.value;

        if (!queryText && sizeQuery === "any") {
            resultsBody.innerHTML = "";
            resultsHeader.style.display = "none";
            return;
        }

        resultsHeader.style.display = "grid";
        const queryWords = queryText.split(/\s+/).filter(w => w.length > 0);

        const filtered = plantDB.filter(item => {
            const itemName = (item.name || "").toUpperCase();
            const itemSizeField = (item.size || "").toUpperCase();
            const matchText = queryWords.length === 0 || queryWords.every(w => itemName.includes(w) || itemSizeField.includes(w));
            const matchSize = sizeQuery === 'any' || itemSizeField.includes(sizeQuery);
            return matchText && matchSize;
        });

        resultsBody.innerHTML = filtered.slice(0, 100).map(item => `
            <div class="row">
                <div class="vendor">${item.company || '---'}</div>
                <div class="plant-name-cell">${item.name}</div>
                <div class="size-val">${item.size}</div>
            </div>
        `).join('');
    }

    function resetSearch() {
        plantInput.value = "";
        preview.innerText = "Waiting for selection...";
        sizeFilter.value = "any";
        sugBox.style.display = "none";
        performSearch();
    }
    
    document.addEventListener('click', (e) => { 
        if (e.target !== plantInput) sugBox.style.display = "none"; 
    });
</script>

</body>
</html>
