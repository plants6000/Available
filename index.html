<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Inventory System - Henry P</title>
    <style>
        :root { 
            --bg-dark: #0f0f0f; 
            --card-bg: #181818; 
            --text-main: #e0e0e0; 
            --text-dim: #a0a0a0;
            --neon-green: #39FF14; 
            --botanical-green: #4c7c4e;
            --border: #2a2a2a;
        }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg-dark); color: var(--text-main); 
            margin: 0; padding: 10px; 
        }

        /* Header Layout */
        .top-meta { display: flex; justify-content: space-between; align-items: flex-start; max-width: 1100px; margin: 0 auto 20px; }
        .credit { font-size: 0.7rem; color: var(--text-dim); font-weight: bold; }
        
        .weather-info { text-align: right; font-size: 0.8rem; color: var(--text-dim); line-height: 1.4; }
        .weather-line-1 { font-weight: 500; }
        .weather-line-2 { color: #fff; font-weight: bold; }
        .weather-date { text-transform: lowercase; }

        .welcome-title { text-align: center; color: var(--neon-green); font-size: 1.8rem; font-weight: 800; margin: 10px 0; }

        .container { max-width: 1100px; margin: 0 auto; }

        .search-panel {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            border: 2px solid var(--neon-green); box-shadow: 0 0 15px rgba(57, 255, 20, 0.1);
            margin-bottom: 20px;
        }

        /* Nueva fila para botones y filtros superiores */
        .top-controls { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; gap: 10px; }
        
        .btn-new { 
            background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); 
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; 
            height: 40px; white-space: nowrap;
        }

        .vendor-box { width: 200px; }

        .selected-preview { text-align: center; font-style: italic; color: var(--text-dim); margin-bottom: 15px; font-size: 0.9rem; min-height: 1.2em; }

        /* Fila de Buscador y Size */
        .main-search-row { display: grid; grid-template-columns: 1fr 120px; gap: 15px; }
        .input-group { position: relative; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--neon-green); font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }

        input, select { 
            width: 100%; padding: 12px; background: #000; border: 1.5px solid var(--border); 
            border-radius: 8px; color: #fff; font-size: 1rem; box-sizing: border-box;
        }

        #suggestions {
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: #222; border: 1px solid var(--botanical-green);
            z-index: 2000; max-height: 250px; overflow-y: auto; display: none;
            border-radius: 0 0 10px 10px;
        }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #333; }
        .suggestion-item:hover { background: #2a2a2a; color: var(--neon-green); }

        /* Tabla */
        .results-wrapper { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: #000; max-height: 50vh; overflow-y: auto; }
        .header { background: var(--botanical-green); display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px; font-weight: bold; font-size: 0.8rem; }
        .row { display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 10px; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; align-items: center; }

        @media (max-width: 600px) {
            .top-controls { flex-direction: row; align-items: flex-end; }
            .vendor-box { width: 150px; }
            .main-search-row { grid-template-columns: 1fr 90px; }
        }
    </style>
</head>
<body>

    <div class="top-meta">
        <div class="credit">PROJECT BY "Henry P"</div>
        <div class="weather-info">
            <div class="weather-line-1">Min: 75°F | Max: 88°F | Wind: 5-12 mph</div>
            <div class="weather-line-2">Miami, FL, Sunny, 82°F</div>
            <div class="weather-date" id="currentDate">monday 05/06/26</div>
        </div>
    </div>

    <div class="welcome-title">Welcome</div>

    <div class="container">
        <div class="search-panel">
            <div class="top-controls">
                <button class="btn-new" onclick="resetSearch()">New Search</button>
                <div class="vendor-box">
                    <div class="input-group">
                        <label>Vendor</label>
                        <select id="vendorFilter" onchange="performSearch()"></select>
                    </div>
                </div>
            </div>

            <div id="selectionPreview" class="selected-preview">Waiting for selection...</div>

            <div class="main-search-row">
                <div class="input-group">
                    <label>Botanic Name / SKU</label>
                    <input type="text" id="plantInput" placeholder="Type here..." autocomplete="off" disabled>
                    <div id="suggestions"></div>
                </div>
                <div class="input-group">
                    <label>Size</label>
                    <select id="sizeFilter" onchange="performSearch()">
                        <option value="any">Any</option>
                        <option value="01">01G</option>
                        <option value="03">03G</option>
                        <option value="07">07G</option>
                        <option value="15">15G</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="results-wrapper">
            <div id="resultsHeader" class="header" style="display: none;">
                <div>VENDOR</div><div>NAME</div><div>SIZE</div>
            </div>
            <div id="resultsBody"></div>
        </div>
    </div>

<script>
    let plantDB = [];
    let suggestionsDB = [];
    const formasAIgnorar = ["PREMIUM", "ASSORTED", "STD", "MULT", "PATIO", "ON", "POLE", "BOWL", "GARDEN", "CLAY", "SHRUB", "TREE", "STK", "COLUMN", "DWF", "SD", "MULTI", "TOP"];

    const plantInput = document.getElementById('plantInput');
    const vendorFilter = document.getElementById('vendorFilter');
    const sizeFilter = document.getElementById('sizeFilter');
    const sugBox = document.getElementById('suggestions');
    const resultsBody = document.getElementById('resultsBody');
    const resultsHeader = document.getElementById('resultsHeader');
    const preview = document.getElementById('selectionPreview');

    // Cargar Fecha Real formateada como quieres
    function setDate() {
        const now = new Date();
        const options = { weekday: 'long', month: '2-digit', day: '2-digit', year: '2-digit' };
        let dateStr = now.toLocaleDateString('en-US', options).toLowerCase();
        // Ajuste manual para el formato exacto: monday 05/06/26
        const parts = now.toLocaleDateString('en-US', {month:'2-digit', day:'2-digit', year:'2-digit'}).split('/');
        const dayName = now.toLocaleDateString('en-US', {weekday:'long'}).toLowerCase();
        document.getElementById('currentDate').innerText = `${dayName} ${parts[0]}/${parts[1]}/${parts[2]}`;
    }
    setDate();

    async function loadData() {
        try {
            const [resP, resH] = await Promise.all([fetch('plantas.json'), fetch('home.json')]);
            plantDB = await resP.json();
            suggestionsDB = await resH.json();
            
            const vendors = [...new Set(plantDB.map(i => i.company))].filter(Boolean).sort();
            vendorFilter.innerHTML = '<option value="any">Any Vendor</option>' + vendors.map(v => `<option value="${v}">${v}</option>`).join('');
            
            plantInput.disabled = false;
        } catch (e) { plantInput.placeholder = "Error loading..."; }
    }

    function procesarAbreviacion(texto) {
        let soloNombre = texto.split('(')[0].trim();
        const comillasMatch = soloNombre.match(/'(.*?)'/);
        let primera = soloNombre.split(' ')[0].substring(0, 3);

        if (comillasMatch) {
            let dentro = comillasMatch[1].trim().split(/\s+/);
            if (dentro.length >= 2) return `${primera} ${dentro[0][0]} ${dentro[dentro.length-1].substring(0,4)}`.toLowerCase();
            return `${primera} ${dentro[0].substring(0,4)}`.toLowerCase();
        }
        let palabras = soloNombre.split(/\s+/).filter(p => !formasAIgnorar.includes(p.toUpperCase()));
        if (palabras.length > 1) return `${primera} ${palabras[palabras.length-1].substring(0,4)}`.toLowerCase();
        return soloNombre.substring(0, 8).toLowerCase();
    }

    plantInput.addEventListener('input', () => {
        let val = plantInput.value.toUpperCase().trim();
        if (val.length >= 2) {
            const matches = suggestionsDB.filter(s => s.display_name.toUpperCase().includes(val));
            if (matches.length > 0) {
                sugBox.innerHTML = matches.slice(0, 15).map(m => {
                    const safe = m.display_name.replace(/'/g, "&#39;");
                    return `<div class="suggestion-item" onmousedown="applySug('${safe}')">${m.display_name}</div>`;
                }).join('');
                sugBox.style.display = "block";
            } else { sugBox.style.display = "none"; }
        } else { sugBox.style.display = "none"; }
        performSearch();
    });

    function applySug(nombre) {
        const nombreLimpio = nombre.replace(/&#39;/g, "'");
        preview.innerText = nombreLimpio;
        preview.style.color = "var(--neon-green)";
        plantInput.value = procesarAbreviacion(nombreLimpio);
        sugBox.style.display = "none";
        performSearch();
        setTimeout(() => { plantInput.blur(); preview.style.color = "var(--text-dim)"; }, 300);
    }

    function performSearch() {
        const q = plantInput.value.toUpperCase().trim();
        const v = vendorFilter.value;
        const s = sizeFilter.value;
        if (!q && v === "any" && s === "any") { resultsBody.innerHTML = ""; resultsHeader.style.display = "none"; return; }

        resultsHeader.style.display = "grid";
        const queryWords = q.split(/\s+/).filter(Boolean);
        const filtered = plantDB.filter(item => {
            const mN = queryWords.every(w => item.name.toUpperCase().includes(w));
            const mV = v === "any" || item.company === v;
            const mS = s === "any" || item.size.toUpperCase().includes(s.toUpperCase());
            return mN && mV && mS;
        });

        resultsBody.innerHTML = filtered.slice(0, 100).map(i => `
            <div class="row">
                <div>${i.company}</div>
                <div>${i.name}</div>
                <div>${i.size}</div>
            </div>`).join('');
    }

    function resetSearch() {
        plantInput.value = ""; vendorFilter.value = "any"; sizeFilter.value = "any";
        sugBox.style.display = "none"; preview.innerText = "Waiting for selection...";
        performSearch();
    }

    document.addEventListener('mousedown', (e) => {
        if (!sugBox.contains(e.target) && e.target !== plantInput) sugBox.style.display = "none";
    });

    loadData();
</script>
</body>
</html>
