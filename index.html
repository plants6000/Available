<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Inventory System - Henry P Edition</title>
    <style>
        :root { 
            --bg-dark: #0f0f0f; 
            --card-bg: #181818; 
            --text-main: #e0e0e0; 
            --text-dim: #a0a0a0;
            --botanical-green: #4c7c4e; 
            --neon-green: #39FF14; 
            --border-color: #2a2a2a;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 20px; 
        }

        .credit { position: absolute; top: 15px; left: 20px; font-size: 0.7rem; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; }
        .container { max-width: 1000px; margin: 50px auto; display: flex; flex-direction: column; }

        .search-panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--neon-green); 
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); 
            margin-bottom: 40px; /* Más espacio abajo para sugerencias */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-area { display: flex; gap: 25px; align-items: flex-start; }
        .main-search-box { flex: 3; position: relative; }
        
        .input-group label { 
            font-size: 0.8rem; color: var(--neon-green); 
            font-weight: 700; margin-bottom: 8px; display: block;
        }
        
        #plantInput {
            width: 100%; padding: 15px; border: 2px solid var(--border-color); border-radius: 12px;
            font-size: 1rem; background: #000; color: #fff;
            transition: all 0.3s ease; box-sizing: border-box;
        }

        #suggestions {
            position: absolute; 
            top: calc(100% + 5px); /* Ahora bajan normalmente para mejor visibilidad móvil */
            left: 0; width: 100%; 
            background: #222; border: 1px solid var(--botanical-green);
            z-index: 1001; max-height: 200px; overflow-y: auto; display: none;
            border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .suggestion-item { 
            padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #333; 
            display: flex; flex-direction: column; gap: 2px;
        }
        
        /* Letras más pequeñas en sugerencias como pediste */
        .sug-botanic { font-weight: 700; font-size: 0.85rem; color: #fff; }
        .sug-common { font-size: 0.75rem; color: var(--text-dim); font-style: italic; }

        .filters-column { flex: 0.8; display: flex; flex-direction: column; gap: 15px; }
        select { 
            background: #222; color: white; border: 2px solid var(--border-color); 
            padding: 10px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; width: 100%;
        }

        .results-container { border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--border-color); }
        .header { background: var(--botanical-green); color: white; display: grid; grid-template-columns: 1fr 2.5fr 1.5fr; padding: 14px; font-weight: 700; font-size: 0.85rem; }
        .row { display: grid; grid-template-columns: 1fr 2.5fr 1.5fr; padding: 14px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; align-items: center; }

        .btn-new { 
            background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); 
            padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600;
            width: fit-content; transition: 0.3s;
        }
        .btn-new:hover { background: rgba(57, 255, 20, 0.1); }

        @media (max-width: 768px) {
            .search-area { flex-direction: column; }
            .filters-column { flex-direction: row; width: 100%; }
            .search-panel { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div class="credit">PROJECT BY "Henry P"</div>

<div class="container">
    <div class="search-panel">
        <!-- Botón movido dentro del panel para que no flote solo -->
        <button class="btn-new" onclick="resetSearch()">New Search</button>
        
        <div class="search-area">
            <div class="main-search-box">
                <div class="input-group">
                    <label>Search Botanic Name or SKU</label>
                    <input type="text" id="plantInput" placeholder="Cargando datos..." disabled autocomplete="off">
                    <div id="suggestions"></div>
                </div>
            </div>

            <div class="filters-column">
                <div class="input-group" style="flex: 1;">
                    <label>Size</label>
                    <select id="sizeFilter">
                        <option value="any">Any Size</option>
                        <option value="01">01G</option><option value="02">02G</option>
                        <option value="05">05G</option><option value="07">07G</option>
                        <option value="10">10G</option><option value="15">15G</option>
                        <option value="24">24"</option><option value="25">25G</option>
                        <option value="36">36"</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Form</label>
                    <select id="formFilter">
                        <option value="any">Any Form</option>
                        <option value="SHRUB">Shrub</option>
                        <option value="TREE">Tree</option>
                        <option value="STK">Staked</option>
                        <option value="PATIO">Patio</option>
                        <option value="COLUMN">Column</option>
                        <option value="DWF">Dwarf</option>
                        <option value="SD">Semi Dwarf</option>
                        <option value="STD">Std</option>
                        <option value="MULTI">Multi</option>
                        <option value="TOP">Topiary</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="results-container">
        <div id="resultsHeader" class="header" style="display: none;">
            <div>VENDOR</div><div>BOTANIC NAME</div><div>SIZE / INFO</div>
        </div>
        <div id="resultsBody"></div>
    </div>
</div>

<script>
    let plantDB = [];
    let suggestionsDB = [];

    const plantInput = document.getElementById('plantInput');
    const sizeFilter = document.getElementById('sizeFilter');
    const formFilter = document.getElementById('formFilter');
    const sugBox = document.getElementById('suggestions');
    const resultsBody = document.getElementById('resultsBody');
    const resultsHeader = document.getElementById('resultsHeader');

    // Palabras de "forma" que debemos ignorar en la abreviación
    const formasAIgnorar = ["SHRUB", "TREE", "STK", "PATIO", "COLUMN", "DWF", "SD", "STD", "MULTI", "TOP"];

    async function loadData() {
        try {
            const [resPlantas, resHome] = await Promise.all([
                fetch('plantas.json'),
                fetch('home.json')
            ]);
            plantDB = await resPlantas.json();
            suggestionsDB = await resHome.json();
            plantInput.disabled = false;
            plantInput.placeholder = "Enter Name or SKU...";
        } catch (error) {
            plantInput.placeholder = "Error al cargar datos.";
        }
    }

    loadData();

    function limpiarInput(texto) { return texto.replace(/[.*+?^${}()|[\]\\]/g, ""); }

    // --- LÓGICA DE ABREVIACIÓN ---
    function procesarAbreviacion(texto) {
        // 1. Quitar paréntesis
        let limpio = texto.replace(/\(.*?\)/g, '').trim();
        
        // 2. Buscar comillas simples
        const comillasMatch = limpio.match(/'(.*?)'/g);
        let primeraPalabra = limpio.split(' ')[0].substring(0, 3);
        
        if (comillasMatch) {
            // Regla comillas: primera y última encontrada
            let contenido = comillasMatch[0].replace(/'/g, '').trim().split(' ');
            if (contenido.length >= 2) {
                return `${primeraPalabra} ${contenido[0].substring(0, 2)} ${contenido[contenido.length-1].substring(0, 3)}`.toLowerCase();
            }
            return `${primeraPalabra} ${contenido[0].substring(0, 3)}`.toLowerCase();
        } else {
            // Regla sin comillas: Primera palabra (3) + Última palabra (3) que no sea número ni forma
            let palabras = limpio.split(' ').filter(p => {
                return isNaN(p) && !formasAIgnorar.includes(p.toUpperCase());
            });
            if (palabras.length > 1) {
                return `${primeraPalabra} ${palabras[palabras.length - 1].substring(0, 3)}`.toLowerCase();
            }
            return primeraPalabra.toLowerCase();
        }
    }

    plantInput.addEventListener('input', () => {
        let val = limpiarInput(plantInput.value).toUpperCase().trim();
        
        // Reiniciar combos si es una búsqueda nueva (borró y empezó a escribir)
        if (val.length === 1) {
            sizeFilter.value = "any";
            formFilter.value = "any";
            sizeFilter.classList.remove('active-filter');
            formFilter.classList.remove('active-filter');
        }

        if (val.length >= 2) {
            const isSearchingSKU = /^\d+$/.test(val); // Detecta si el usuario escribe solo números

            let matches = suggestionsDB.filter(s => {
                const nameMatch = (s.display_name || "").toUpperCase().includes(val);
                const skuMatch = (s.variantes || "").toUpperCase().includes(val);
                return nameMatch || skuMatch;
            });

            if (matches.length > 0) {
                sugBox.innerHTML = matches.slice(0, 12).map(m => `
                    <div class="suggestion-item" onclick="applySug('${m.display_name}')">
                        <span class="sug-botanic">${m.display_name}</span>
                        ${isSearchingSKU ? `<span class="sug-common">${m.variantes}</span>` : ''}
                    </div>
                `).join('');
                sugBox.style.display = "block";
            } else { sugBox.style.display = "none"; }
        } else { sugBox.style.display = "none"; }
        
        performSearch(); 
    });

    function applySug(nombreSeleccionado) {
        // Aplicamos la lógica de abreviación al hacer clic
        plantInput.value = procesarAbreviacion(nombreSeleccionado);
        sugBox.style.display = "none";
        performSearch();
        plantInput.focus();
    }

    function performSearch() {
        const queryText = limpiarInput(plantInput.value).toUpperCase();
        const sizeQuery = sizeFilter.value;
        const formQuery = formFilter.value;

        if (!queryText && sizeQuery === "any" && formQuery === "any") {
            resultsBody.innerHTML = "";
            resultsHeader.style.display = "none";
            return;
        }

        resultsHeader.style.display = "grid";
        const filtered = plantDB.filter(item => {
            const itemName = (item.name || "").toUpperCase();
            const itemSizeField = (item.size || "").toUpperCase();
            const words = queryText.split(/\s+/);
            const matchText = words.every(w => itemName.includes(w) || itemSizeField.includes(w));
            const matchSize = sizeQuery === 'any' || itemSizeField.includes(sizeQuery);
            const matchForm = (formQuery === 'any') ? true : (itemName + " " + itemSizeField).includes(formQuery);
            return matchText && matchSize && matchForm;
        });

        resultsBody.innerHTML = filtered.slice(0, 100).map(item => `
            <div class="row">
                <div class="vendor">${item.company || '---'}</div>
                <div class="plant-name-cell">${item.name}</div>
                <div class="size-val ${sizeQuery !== 'any' ? 'highlight-size' : ''}">${item.size}</div>
            </div>
        `).join('');
    }

    function resetSearch() {
        plantInput.value = "";
        sizeFilter.value = "any";
        formFilter.value = "any";
        sugBox.style.display = "none";
        performSearch();
    }
    
    document.addEventListener('click', (e) => { 
        if (e.target !== plantInput) sugBox.style.display = "none"; 
    });
</script>

</body>
</html>
